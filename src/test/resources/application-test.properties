# Datasource: overridden at runtime by BaseIntegrationTest via @DynamicPropertySource.
# If Docker is available  → Testcontainers spins up postgres:16 automatically.
# If Docker is NOT running → falls back to the local docker-compose DB below.
#   In that case run:  docker compose up -d   before running tests.
spring.datasource.url=jdbc:postgresql://localhost:5432/interop
spring.datasource.username=interop
spring.datasource.password=interop

interop.state.checkpoint-path=./target/test-state/checkpoint.json
interop.lake.base-path=./target/test-lake
interop.events.path=./target/test-events/events.jsonl
logging.level.com.interop=DEBUG