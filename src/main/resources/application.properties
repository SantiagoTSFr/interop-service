spring.application.name=interop-service
server.port=8080

# DataSource
spring.datasource.url=jdbc:postgresql://localhost:5432/interop
spring.datasource.username=interop
spring.datasource.password=interop
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.connection-timeout=5000

# Paths
interop.state.checkpoint-path=./state/checkpoint.json
interop.lake.base-path=./lake
interop.events.path=./events/events.jsonl

# Logging
logging.level.com.interop=INFO
